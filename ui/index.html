<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Competitive Intelligence Platform</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1f3a 0%, #0f1628 100%);
      border-bottom: 1px solid #2d3748;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header .logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 2px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .config-card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 28px;
    }

    .config-card label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .config-card input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 0.9rem;
      font-family: 'Courier New', monospace;
      outline: none;
    }

    .query-section {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .query-section input {
      flex: 1;
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 14px 20px;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
    }

    .btn-analyze {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-analyze:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .pipeline {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .pipeline-step {
      flex: 1;
      min-width: 150px;
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.8rem;
      color: #475569;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pipeline-step .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #1e293b;
    }

    .pipeline-step.active {
      border-color: #6366f1;
      color: #a78bfa;
      background: #1a1035;
    }

    .pipeline-step.active .dot {
      background: #6366f1;
      box-shadow: 0 0 8px #6366f1;
      animation: pulse 1s infinite;
    }

    .pipeline-step.done {
      border-color: #059669;
      color: #34d399;
      background: #0a1f15;
    }

    .pipeline-step.done .dot {
      background: #059669;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .spinner-wrap {
      text-align: center;
      padding: 48px;
      display: none;
    }

    .spinner-wrap.visible {
      display: block;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #1e293b;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner-wrap p {
      color: #64748b;
      font-size: 0.9rem;
    }

    .error-box {
      background: #1a0a0a;
      border: 1px solid #7f1d1d;
      border-radius: 12px;
      padding: 16px 20px;
      color: #fca5a5;
      font-size: 0.88rem;
      display: none;
      margin-top: 16px;
      margin-bottom: 20px;
      white-space: pre-wrap;
    }

    .error-box.visible {
      display: block;
    }

    .result-card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 32px;
      display: none;
    }

    .result-card.visible {
      display: block;
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1e293b;
    }

    .result-header .badge {
      background: linear-gradient(135deg, #059669, #0d9488);
      color: white;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .result-header .competitor-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #e2e8f0;
    }

    .markdown-body {
      line-height: 1.75;
      color: #cbd5e1;
    }

    .markdown-body h2 {
      color: #a78bfa;
      font-size: 1.25rem;
      margin: 28px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1e293b;
    }

    .markdown-body h3 {
      color: #60a5fa;
      font-size: 1rem;
      margin: 20px 0 8px;
    }

    .markdown-body p {
      margin: 10px 0;
    }

    .markdown-body ul, .markdown-body ol {
      padding-left: 20px;
      margin: 8px 0;
    }

    .markdown-body li {
      margin: 6px 0;
    }

    .markdown-body strong {
      color: #e2e8f0;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.88rem;
    }

    .markdown-body th {
      background: #1e293b;
      color: #94a3b8;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
    }

    .markdown-body td {
      padding: 10px 14px;
      border-bottom: 1px solid #1e293b;
      color: #cbd5e1;
    }

    .markdown-body code {
      background: #1e293b;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85em;
      color: #a78bfa;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">🔍</div>
    <div>
      <h1>Competitive Intelligence Platform</h1>
      <p>Multi-Agent A2A System powered by Google ADK + Gemini</p>
    </div>
  </header>

  <div class="container">
    <div class="config-card">
      <label>Host Agent URL</label>
      <input
        type="text"
        id="hostUrl"
        placeholder="https://competitive-intel-host-16967482277.us-central1.run.app"
      />
    </div>

    <div class="query-section">
      <input
        type="text"
        id="queryInput"
        placeholder="e.g. Analyze competitor: OpenAI"
        onkeydown="if(event.key==='Enter') analyze()"
      />
      <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">⚡ Analyze</button>
    </div>

    <div class="pipeline">
      <div class="pipeline-step" id="step-market">
        <div class="dot"></div> Market Scanner
      </div>
      <div class="pipeline-step" id="step-sentiment">
        <div class="dot"></div> Sentiment Analyzer
      </div>
      <div class="pipeline-step" id="step-pricing">
        <div class="dot"></div> Pricing Intelligence
      </div>
      <div class="pipeline-step" id="step-report">
        <div class="dot"></div> Report Generator
      </div>
    </div>

    <div class="spinner-wrap" id="spinner">
      <div class="spinner"></div>
      <p id="spinnerText">Initializing agents...</p>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="result-card" id="resultCard">
      <div class="result-header">
        <span class="badge">✓ Complete</span>
        <span class="competitor-name" id="competitorName"></span>
      </div>
      <div class="markdown-body" id="reportOutput"></div>
    </div>
  </div>

  <script>
    const STEPS = [
      { id: 'step-market', keywords: ['market_scanner', 'scan_market'] },
      { id: 'step-sentiment', keywords: ['sentiment_analyzer', 'analyze_sentiment'] },
      { id: 'step-pricing', keywords: ['pricing_intelligence', 'analyze_pricing'] },
      { id: 'step-report', keywords: ['report_generator', 'generate_report'] },
    ];

    function resetPipeline() {
      STEPS.forEach(step => {
        const el = document.getElementById(step.id);
        el.classList.remove('active', 'done');
      });
    }

    function setStepActive(author) {
      if (!author) return;

      const lower = author.toLowerCase();

      STEPS.forEach((step, index) => {
        const el = document.getElementById(step.id);

        if (step.keywords.some(keyword => lower.includes(keyword))) {
          STEPS.slice(0, index).forEach(previousStep => {
            const previousEl = document.getElementById(previousStep.id);
            previousEl.classList.remove('active');
            previousEl.classList.add('done');
          });

          el.classList.remove('done');
          el.classList.add('active');
        }
      });
    }

    function markAllDone() {
      STEPS.forEach(step => {
        const el = document.getElementById(step.id);
        el.classList.remove('active');
        el.classList.add('done');
      });
    }

    function showError(message) {
      const box = document.getElementById('errorBox');
      box.textContent = message;
      box.classList.add('visible');
    }

    function hideError() {
      const box = document.getElementById('errorBox');
      box.textContent = '';
      box.classList.remove('visible');
    }

    async function analyze() {
      const hostUrl = document.getElementById('hostUrl').value.trim().replace(/\/$/, '');
      const query = document.getElementById('queryInput').value.trim();

      if (!hostUrl) {
        showError('Please enter the Host Agent URL.');
        return;
      }

      if (!query) {
        showError('Please enter a competitor to analyze.');
        return;
      }

      if (query.length > 500) {
        showError('Query too long. Keep it under 500 characters.');
        return;
      }

      const match = query.match(/:\s*(.+)$/);
      const competitor = match ? match[1].trim() : query;

      hideError();
      resetPipeline();

      document.getElementById('resultCard').classList.remove('visible');
      document.getElementById('reportOutput').innerHTML = '';
      document.getElementById('spinner').classList.add('visible');
      document.getElementById('spinnerText').textContent = 'Connecting to host agent...';
      document.getElementById('analyzeBtn').disabled = true;

      const userId = 'ui_user';
      const appName = 'host';

      try {
        const sessionRes = await fetch(`${hostUrl}/apps/${appName}/users/${userId}/sessions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}',
        });

        if (!sessionRes.ok) {
          const errorText = await sessionRes.text().catch(() => '');
          throw new Error(`Failed to create session: HTTP ${sessionRes.status} ${sessionRes.statusText}\n${errorText}`);
        }

        const session = await sessionRes.json();
        const sessionId = session.id;

        if (!sessionId) {
          throw new Error('Session was created, but no session ID was returned.');
        }

        const body = JSON.stringify({
          app_name: appName,
          user_id: userId,
          session_id: sessionId,
          new_message: {
            role: 'user',
            parts: [{ text: query }],
          },
        });

        document.getElementById('spinnerText').textContent = 'Starting A2A workflow...';

        const response = await fetch(`${hostUrl}/run_sse`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body,
        });

        if (!response.ok) {
          const errorText = await response.text().catch(() => '');
          throw new Error(`A2A run failed: HTTP ${response.status} ${response.statusText}\n${errorText}`);
        }

        if (!response.body) {
          throw new Error('No response stream received from host agent.');
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        let fullReport = '';
        let buffer = '';

        document.getElementById('spinnerText').textContent = 'Agents working...';

        while (true) {
          const { done, value } = await reader.read();

          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data:')) continue;

            const raw = line.slice(5).trim();

            if (!raw || raw === '[DONE]') continue;

            let event;

            try {
              event = JSON.parse(raw);
            } catch (parseError) {
              console.warn('Could not parse SSE event:', raw);
              continue;
            }

            console.log('SSE event:', event);

            if (event.author) {
              setStepActive(event.author);
              document.getElementById('spinnerText').textContent = `${event.author} is working...`;
            }

            if (event.content && Array.isArray(event.content.parts)) {
              for (const part of event.content.parts) {
                if (part.text) {
                  fullReport += part.text;
                }
              }
            }
          }
        }

        markAllDone();

        document.getElementById('spinner').classList.remove('visible');
        document.getElementById('competitorName').textContent = competitor;

        document.getElementById('reportOutput').innerHTML =
          DOMPurify.sanitize(marked.parse(fullReport || '_No report content received._'));

        document.getElementById('resultCard').classList.add('visible');

      } catch (error) {
        document.getElementById('spinner').classList.remove('visible');
        showError(`Error: ${error.message}`);
      } finally {
        document.getElementById('analyzeBtn').disabled = false;
      }
    }
  </script>
</body>
</html>
